<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Health</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 24px; }
    .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; max-width: 720px; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .pill { display:inline-block; padding: 6px 10px; border-radius: 999px; font-weight: 700; }
    .ok { background:#dcfce7; color:#166534; border:1px solid #86efac; }
    .degraded { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }
    .error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
    table { width:100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align:left; padding: 8px; border-bottom:1px solid #f1f5f9; font-size: 14px; }
    .meta { color:#6b7280; font-size: 13px; margin-top: 8px; }
    button { padding: 8px 12px; border-radius: 10px; border:1px solid #e5e7eb; background:#fff; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>API Health (live)</h1>
    <div>
      <span id="statusPill" class="pill degraded">Loading...</span>
      <span class="meta">Last update: <span id="lastUpdate">—</span></span>
    </div>

    <div style="margin-top:12px; display:flex; gap:12px; align-items:center;">
      <button id="refreshBtn">Refresh now</button>
      <span class="meta">Polling every <b id="intervalLabel">5</b>s</span>
    </div>

    <table>
      <tbody id="checksBody"></tbody>
    </table>
  </div>

  <script>
    const API_URL = '/api/health';
    const POLL_MS = 5000;

    const statusPill = document.getElementById('statusPill');
    const lastUpdate = document.getElementById('lastUpdate');
    const checksBody = document.getElementById('checksBody');
    const refreshBtn = document.getElementById('refreshBtn');
    document.getElementById('intervalLabel').textContent = (POLL_MS/1000);

    function setPill(type, text) {
      statusPill.className = 'pill ' + type;
      statusPill.textContent = text;
    }

    function renderChecks(checks) {
      checksBody.innerHTML = '';
      for (const [k, v] of Object.entries(checks || {})) {
        const tr = document.createElement('tr');
        const tdKey = document.createElement('td');
        tdKey.textContent = k;
        const tdVal = document.createElement('td');
        tdVal.textContent = typeof v === 'object' ? JSON.stringify(v) : String(v);
        tr.appendChild(tdKey);
        tr.appendChild(tdVal);
        checksBody.appendChild(tr);
      }
    }

    async function fetchHealth() {
      try {
        const res = await fetch(API_URL, { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));

        const status = data.status || 'unknown';
        const checks = data.checks || {};

        if (res.ok && status === 'ok') setPill('ok', 'OK');
        else if (res.ok) setPill('degraded', String(status).toUpperCase());
        else setPill('degraded', 'DEGRADED');

        renderChecks(checks);
        lastUpdate.textContent = new Date().toLocaleString();
      } catch (e) {
        setPill('error', 'ERROR');
        checksBody.innerHTML = '';
        lastUpdate.textContent = new Date().toLocaleString();
      }
    }

    refreshBtn.addEventListener('click', fetchHealth);
    fetchHealth();
    setInterval(fetchHealth, POLL_MS);
  </script>
</body>
</html>
